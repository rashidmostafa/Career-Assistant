kind = "mobile"
previewPath = "/"
title = "AI Career Assistant"
version = "1.0.0"
id = "artifacts/career-assistant"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23840

[services.development]
run = "pnpm --filter @workspace/career-assistant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/career-assistant", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/career-assistant", "run", "serve" ]

[services.env]
PORT = "23840"
BASE_PATH = "/"
